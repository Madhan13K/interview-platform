spring:
  application:
    name: interview-platform-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/interview_platform}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: 300000          # 5 minutes
      max-lifetime: 1800000         # 30 minutes
      connection-timeout: 30000     # 30 seconds
      leak-detection-threshold: 60000  # 1 minute (detect leaked connections)
      pool-name: interview-platform-pool
      connection-init-sql: SET search_path TO public
      data-source-properties:
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStats: true

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  security:
    user:
      name: admin
      password: ${SPRING_SECURITY_PASSWORD:admin}
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
            scope: [openid, profile, email]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:Ov23lik0ITpRpUhYTS0K}
            client-secret: ${GITHUB_CLIENT_SECRET:5ba116eb19f7e2b283308e5623a16aa0ee30131b}
            scope: [user:email, read:user]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/github"
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:placeholder}
            client-secret: ${MICROSOFT_CLIENT_SECRET:placeholder}
            scope: [openid, profile, email]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/microsoft"
            client-name: Microsoft
            authorization-grant-type: authorization_code
          okta:
            client-id: ${OKTA_CLIENT_ID:0oa14fz2oamAXh9h1698}
            client-secret: ${OKTA_CLIENT_SECRET:qi0rnLoP4ROvrCtiJCS6gJiq-BKFTL518hAuCzww41BXmwoNmBdFbcbeCAx6voHS}
            scope: [openid, profile, email]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/okta"
            client-name: Okta
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:interview-platform}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:FqQdEOnNuda9oTWvk2AgcKdOARHUCQgV}
            scope: [openid, profile, email]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/keycloak"
            client-name: Keycloak
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_basic
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: email
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/v1.0/me
            user-name-attribute: id
          okta:
            authorization-uri: ${OKTA_AUTH_URL:https://integrator-8402944.okta.com/oauth2/default/v1/authorize}
            token-uri: ${OKTA_TOKEN_URL:https://integrator-8402944.okta.com/oauth2/default/v1/token}
            user-info-uri: ${OKTA_USERINFO_URL:https://integrator-8402944.okta.com/oauth2/default/v1/userinfo}
            jwk-set-uri: ${OKTA_JWKS_URL:https://integrator-8402944.okta.com/oauth2/default/v1/keys}
            user-name-attribute: email
          keycloak:
            authorization-uri: ${KEYCLOAK_AUTH_URL:http://localhost:9090/realms/interview-platform/protocol/openid-connect/auth}
            token-uri: ${KEYCLOAK_TOKEN_URL:http://localhost:9090/realms/interview-platform/protocol/openid-connect/token}
            user-info-uri: ${KEYCLOAK_USERINFO_URL:http://localhost:9090/realms/interview-platform/protocol/openid-connect/userinfo}
            jwk-set-uri: ${KEYCLOAK_JWKS_URL:http://localhost:9090/realms/interview-platform/protocol/openid-connect/certs}
            user-name-attribute: preferred_username

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        max.block.ms: 5000
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.interview_platform_backend.*"
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTOSTART:false}
    admin:
      fail-fast: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@interview-platform.com}
    password: ${MAIL_PASSWORD:qcyu pjrt xjmx jbxd}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500
        keep-alive: 60s
      thread-name-prefix: async-thread-
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduler-thread-

  mvc:
    async:
      request-timeout: 30000

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:true}

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB
  max-http-request-header-size: 16KB
  error:
    include-message: always
    include-binding-errors: always

# --- JWT Configuration ---
jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-key-minimum-256-bits-long-change-in-production-environment}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-secret: ${JWT_REFRESH_SECRET:dev-only-jwt-refresh-secret-key-minimum-256-bits-long-change-in-production}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

# --- RSA Keys for JWT signing ---
rsa:
  public-key: classpath:certs/public.pem
  private-key: classpath:certs/private.pem

# --- AWS S3 / LocalStack ---
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:interview-platform-documents}
    region: ${AWS_S3_REGION:us-east-1}
    access-key: ${AWS_S3_ACCESS_KEY:test}
    secret-key: ${AWS_S3_SECRET_KEY:test}
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}
    presigned-url-expiry-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRY:60}

# --- Actuator / Monitoring ---
management:
  endpoints:
    web:
      exposure:
        include: [health, info, metrics, prometheus, loggers]
  endpoint:
    health:
      show-details: when-authorized
  health:
    vault:
      enabled: ${VAULT_HEALTH_ENABLED:false}

# --- Logging ---
logging:
  level:
    root: INFO
    com.interview_platform_backend: INFO

# --- Application Custom Properties ---
app:
  oauth2:
    redirect-uri: ${FRONTEND_URL:http://localhost:3000}/oauth2/callback
    resource-server:
      enabled: ${OAUTH2_RESOURCE_SERVER_ENABLED:true}
      issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080}
    # OAuth2 Client Credentials - Service-to-service authentication
    clients:
      notification-service:
        secret: ${OAUTH2_CLIENT_NOTIFICATION_SECRET:}
      scheduling-service:
        secret: ${OAUTH2_CLIENT_SCHEDULING_SECRET:}
      analytics-service:
        secret: ${OAUTH2_CLIENT_ANALYTICS_SECRET:}
      webhook-service:
        secret: ${OAUTH2_CLIENT_WEBHOOK_SECRET:}
      external-partner:
        secret: ${OAUTH2_CLIENT_EXTERNAL_PARTNER_SECRET:}
  # --- mTLS (Mutual TLS) ---
  mtls:
    enabled: ${MTLS_ENABLED:false}
    identity-extraction: ${MTLS_IDENTITY_EXTRACTION:CN}
    allowed-cn-patterns: ${MTLS_ALLOWED_CN_PATTERNS:}
    allowed-organizations: ${MTLS_ALLOWED_ORGANIZATIONS:}
    crl-enabled: ${MTLS_CRL_ENABLED:false}
    crl-url: ${MTLS_CRL_URL:}
    ocsp-enabled: ${MTLS_OCSP_ENABLED:false}
    certificate-role-mapping:
      enabled: ${MTLS_ROLE_MAPPING_ENABLED:false}
    public-endpoints:
      - /actuator/health
      - /actuator/info
    client:
      key-store: ${MTLS_CLIENT_KEYSTORE_PATH:classpath:certs/client-keystore.p12}
      key-store-password: ${MTLS_CLIENT_KEYSTORE_PASSWORD:changeit}
      trust-store: ${MTLS_CLIENT_TRUSTSTORE_PATH:classpath:certs/server-truststore.p12}
      trust-store-password: ${MTLS_CLIENT_TRUSTSTORE_PASSWORD:changeit}
  multitenancy:
    schema-per-tenant: ${SCHEMA_PER_TENANT:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  security:
    max-request-body-size: ${MAX_REQUEST_BODY_SIZE:2097152}  # 2MB limit for JSON payloads (DoS prevention)
  kafka:
    enabled: ${KAFKA_ENABLED:true}
  search:
    enabled: ${SEARCH_ENABLED:false}
  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:true}
  sms:
    enabled: ${SMS_ENABLED:false}
    provider: ${SMS_PROVIDER:log}
  auth:
    reset-password-base-url: ${FRONTEND_URL:http://localhost:5173}/reset-password
    verification-base-url: ${FRONTEND_URL:http://localhost:5173}/verify-email
  meeting:
    zoom:
      enabled: ${ZOOM_ENABLED:true}
      account-id: ${ZOOM_ACCOUNT_ID:}
      client-id: ${ZOOM_CLIENT_ID:Y0T49c1URwmOZjxHVE7mSA}
      client-secret: ${ZOOM_CLIENT_SECRET:bwAV4mu3ymDrdu7ULaiH6JluupVw4umO}
    google:
      client-id: ${GOOGLE_MEET_CLIENT_ID:placeholder-google-client-id}
  slack:
    enabled: ${SLACK_ENABLED:true}
    webhook-url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/PLACEHOLDER/PLACEHOLDER/PLACEHOLDER}
  teams:
    enabled: ${TEAMS_ENABLED:false}
    webhook-url: ${TEAMS_WEBHOOK_URL:}
  sso:
    base-url: ${SSO_BASE_URL:http://localhost:8080}
    keycloak:
      enabled: ${KEYCLOAK_SSO_ENABLED:true}
      server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9090}
      realm: ${KEYCLOAK_REALM:interview-platform}
      client-id: ${KEYCLOAK_CLIENT_ID:interview-platform}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:interview-platform-secret}
      admin-username: ${KEYCLOAK_ADMIN:admin}
      admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  calendar-sync:
    enabled: ${CALENDAR_SYNC_ENABLED:true}
    sync-interval-minutes: ${CALENDAR_SYNC_INTERVAL:15}
  offer:
    default-expiry-days: ${OFFER_EXPIRY_DAYS:7}
    docusign:
      enabled: ${DOCUSIGN_ENABLED:true}
      api-base-url: ${DOCUSIGN_API_URL:https://demo.docusign.net/restapi}
      account-id: ${DOCUSIGN_ACCOUNT_ID:d1b2fde8-6054-4df7-a895-b63868d8167a}
      integration-key: ${DOCUSIGN_INTEGRATION_KEY:973c20fd-5630-49b7-8e93-eaee398062dd}
    hellosign:
      enabled: ${HELLOSIGN_ENABLED:false}
      api-key: ${HELLOSIGN_API_KEY:}
  security:
    lockout:
      enabled: ${LOCKOUT_ENABLED:true}
      max-failed-attempts: ${LOCKOUT_MAX_ATTEMPTS:5}
      lock-duration-minutes: ${LOCKOUT_DURATION_MINUTES:30}
      attempt-window-minutes: ${LOCKOUT_WINDOW_MINUTES:15}
      max-failed-attempts-per-ip: ${LOCKOUT_MAX_IP_ATTEMPTS:20}
      ip-block-duration-minutes: ${LOCKOUT_IP_BLOCK_MINUTES:60}
      alerts-enabled: ${LOCKOUT_ALERTS_ENABLED:true}
      alert-threshold: ${LOCKOUT_ALERT_THRESHOLD:3}
      ip-blocking-enabled: ${LOCKOUT_IP_BLOCKING:true}
    rsa:
      from-vault: ${RSA_FROM_VAULT:false}
  encryption:
    enabled: ${ENCRYPTION_ENABLED:true}
    secret-key: ${ENCRYPTION_SECRET_KEY:}
    algorithm: AES/GCM/NoPadding
    iv-length: 12
    tag-length: 128
  database:
    separate-users: ${DB_SEPARATE_USERS:false}
    ddl:
      url: ${DB_DDL_URL:${DB_URL:jdbc:postgresql://localhost:5433/interview_platform}}
      username: ${DB_DDL_USERNAME:admin}
      password: ${DB_DDL_PASSWORD:postgres}

  # --- Data Retention ---
  retention:
    enabled: ${DATA_RETENTION_ENABLED:false}
    candidate-data-days: ${RETENTION_CANDIDATE_DAYS:730}
    audit-log-days: ${RETENTION_AUDIT_DAYS:365}
    notification-days: ${RETENTION_NOTIFICATION_DAYS:90}
    activity-days: ${RETENTION_ACTIVITY_DAYS:180}
  # --- Push Notifications (Firebase) ---
  push:
    firebase:
      enabled: ${FIREBASE_PUSH_ENABLED:false}
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  # --- Twilio SMS ---
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  # --- Background Check ---
  background-check:
    enabled: ${BACKGROUND_CHECK_ENABLED:false}
    provider: ${BACKGROUND_CHECK_PROVIDER:checkr}
    api-key: ${BACKGROUND_CHECK_API_KEY:}
    checkr:
      base-url: ${CHECKR_BASE_URL:https://api.checkr.com/v1}
    sterling:
      base-url: ${STERLING_BASE_URL:https://api.sterlingcheck.com/v2}
  # --- ATS Integrations ---
  ats:
    greenhouse:
      api-key: ${GREENHOUSE_API_KEY:}
      base-url: ${GREENHOUSE_BASE_URL:https://harvest.greenhouse.io/v1}
    lever:
      api-key: ${LEVER_API_KEY:}
      base-url: ${LEVER_BASE_URL:https://api.lever.co/v1}
    workday:
      tenant-url: ${WORKDAY_TENANT_URL:}
      client-id: ${WORKDAY_CLIENT_ID:}
  # --- Job Board Posting ---
  job-boards:
    linkedin:
      access-token: ${LINKEDIN_ACCESS_TOKEN:}
    indeed:
      employer-id: ${INDEED_EMPLOYER_ID:}
      api-key: ${INDEED_API_KEY:}
    glassdoor:
      api-key: ${GLASSDOOR_API_KEY:}
  # --- Feature Flags ---
  feature-flags:
    provider: ${FEATURE_FLAGS_PROVIDER:local}
    launchdarkly:
      sdk-key: ${LAUNCHDARKLY_SDK_KEY:}
    flagsmith:
      api-key: ${FLAGSMITH_API_KEY:}
      base-url: ${FLAGSMITH_BASE_URL:https://edge.api.flagsmith.com/api/v1}
  # --- Billing (Stripe) ---
  billing:
    enabled: ${BILLING_ENABLED:false}
    default-currency: ${BILLING_DEFAULT_CURRENCY:USD}
    tax-rate: ${BILLING_TAX_RATE:0.18}
    trial-days: ${BILLING_TRIAL_DAYS:14}
    stripe:
      enabled: ${STRIPE_ENABLED:false}
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    razorpay:
      enabled: ${RAZORPAY_ENABLED:false}
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
    payu:
      enabled: ${PAYU_ENABLED:false}
      merchant-key: ${PAYU_MERCHANT_KEY:}
      merchant-salt: ${PAYU_MERCHANT_SALT:}
      base-url: ${PAYU_BASE_URL:https://info.payu.in}
    cashfree:
      enabled: ${CASHFREE_ENABLED:false}
      app-id: ${CASHFREE_APP_ID:}
      secret-key: ${CASHFREE_SECRET_KEY:}
      base-url: ${CASHFREE_BASE_URL:https://api.cashfree.com/pg}
    phonepe:
      enabled: ${PHONEPE_ENABLED:false}
      merchant-id: ${PHONEPE_MERCHANT_ID:}
      salt-key: ${PHONEPE_SALT_KEY:}
      salt-index: ${PHONEPE_SALT_INDEX:1}
      base-url: ${PHONEPE_BASE_URL:https://api.phonepe.com/apis/hermes}
  # --- SLA Tracking ---
  sla:
    response-time-hours: ${SLA_RESPONSE_TIME_HOURS:48}
    feedback-time-hours: ${SLA_FEEDBACK_TIME_HOURS:24}
    scheduling-time-hours: ${SLA_SCHEDULING_TIME_HOURS:72}
  # --- AI (OpenRouter) ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      api-url: ${OPENAI_API_URL:https://openrouter.ai/api/v1/chat/completions}
      model: ${OPENAI_MODEL:openai/gpt-4o-mini}
      max-tokens: ${OPENAI_MAX_TOKENS:1000}
      temperature: ${OPENAI_TEMPERATURE:0.7}
    scoring:
      enabled: ${AI_SCORING_ENABLED:true}
  # --- Virus Scanning ---
  virus-scan:
    enabled: ${VIRUS_SCAN_ENABLED:false}
    clamav:
      host: ${CLAMAV_HOST:localhost}
      port: ${CLAMAV_PORT:3310}
      timeout-ms: ${CLAMAV_TIMEOUT_MS:30000}
  # --- Email Delivery Tracking ---
  email:
    delivery-tracking:
      enabled: ${EMAIL_DELIVERY_TRACKING:false}
    bounce-threshold: ${EMAIL_BOUNCE_THRESHOLD:5}
  # --- Candidate Sourcing ---
  sourcing:
    github:
      token: ${GITHUB_SOURCING_TOKEN:}
  # --- Data Residency ---
  data-residency:
    default-region: ${DATA_RESIDENCY_DEFAULT_REGION:us-east-1}
    eu-region: ${DATA_RESIDENCY_EU_REGION:eu-west-1}
    ap-region: ${DATA_RESIDENCY_AP_REGION:ap-south-1}
  # --- Mobile SDK ---
  mobile:
    min-version: ${MOBILE_MIN_VERSION:1.0.0}
    force-update: ${MOBILE_FORCE_UPDATE:false}
    maintenance-mode: ${MOBILE_MAINTENANCE_MODE:false}

# --- Code Execution Engine ---
code-execution:
  enabled: ${CODE_EXECUTION_ENABLED:true}
  max-timeout-ms: ${CODE_EXECUTION_MAX_TIMEOUT:30000}
  default-timeout-ms: ${CODE_EXECUTION_DEFAULT_TIMEOUT:10000}
  memory-limit-bytes: ${CODE_EXECUTION_MEMORY_LIMIT:268435456}
  cpu-period-micros: 100000
  cpu-quota-micros: 50000
  pids-limit: 64
  max-output-size: 65536
  network-disabled: true
  max-concurrent-executions: ${CODE_EXECUTION_MAX_CONCURRENT:10}
  max-source-code-size: 100000
  docker:
    host: ${DOCKER_HOST:unix:///var/run/docker.sock}
    connection-timeout-ms: 5000
    response-timeout-ms: 30000

# --- Resilience4j Circuit Breakers ---
resilience4j:
  circuitbreaker:
    instances:
      emailService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      webhookService:
        slidingWindowSize: 20
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
      aiService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        ignoreExceptions:
          - com.interview_platform_backend.interview_platform_backend.exception.ResourceNotFoundException
          - com.interview_platform_backend.interview_platform_backend.exception.BadRequestException
  retry:
    instances:
      emailService:
        maxAttempts: 3
        waitDuration: 2s
      webhookService:
        maxAttempts: 3
        waitDuration: 5s

spring:
  application:
    name: interview-platform-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/interview_platform}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  security:
    user:
      name: admin
      password: ${SPRING_SECURITY_PASSWORD:admin}
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: [openid, profile, email]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: [user:email, read:user]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/github"
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID:placeholder}
            client-secret: ${MICROSOFT_CLIENT_SECRET:placeholder}
            scope: [openid, profile, email]
            redirect-uri: "${OAUTH2_BASE_URL:http://localhost:8080}/login/oauth2/code/microsoft"
            client-name: Microsoft
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: email
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/v1.0/me
            user-name-attribute: id

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        max.block.ms: 5000
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.interview_platform_backend.*"
        session.timeout.ms: 10000
        heartbeat.interval.ms: 3000
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTOSTART:false}
    admin:
      fail-fast: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@interview-platform.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 500
        keep-alive: 60s
      thread-name-prefix: async-thread-
    scheduling:
      pool:
        size: 5
      thread-name-prefix: scheduler-thread-

  mvc:
    async:
      request-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:true}

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000
  error:
    include-message: always
    include-binding-errors: always

# --- JWT Configuration ---
jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-key-minimum-256-bits-long-change-in-production-environment}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-secret: ${JWT_REFRESH_SECRET:dev-only-jwt-refresh-secret-key-minimum-256-bits-long-change-in-production}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}

# --- RSA Keys for JWT signing ---
rsa:
  public-key: classpath:certs/public.pem
  private-key: classpath:certs/private.pem

# --- AWS S3 / LocalStack ---
aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:interview-platform-documents}
    region: ${AWS_S3_REGION:us-east-1}
    access-key: ${AWS_S3_ACCESS_KEY:test}
    secret-key: ${AWS_S3_SECRET_KEY:test}
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}
    presigned-url-expiry-minutes: ${AWS_S3_PRESIGNED_URL_EXPIRY:60}

# --- Actuator / Monitoring ---
management:
  endpoints:
    web:
      exposure:
        include: [health, info, metrics, prometheus, loggers]
  endpoint:
    health:
      show-details: when-authorized

# --- Logging ---
logging:
  level:
    root: INFO
    com.interview_platform_backend: INFO

# --- Application Custom Properties ---
app:
  oauth2:
    redirect-uri: ${FRONTEND_URL:http://localhost:5173}/oauth2/callback
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:true}
  sms:
    enabled: ${SMS_ENABLED:false}
    provider: ${SMS_PROVIDER:log}
  auth:
    reset-password-base-url: ${FRONTEND_URL:http://localhost:5173}/reset-password
    verification-base-url: ${FRONTEND_URL:http://localhost:5173}/verify-email
  meeting:
    zoom:
      api-key: ${ZOOM_API_KEY:}
      api-secret: ${ZOOM_API_SECRET:}
    google:
      client-id: ${GOOGLE_MEET_CLIENT_ID:}
  slack:
    enabled: ${SLACK_ENABLED:false}
    webhook-url: ${SLACK_WEBHOOK_URL:}
  teams:
    enabled: ${TEAMS_ENABLED:false}
    webhook-url: ${TEAMS_WEBHOOK_URL:}
  sso:
    base-url: ${SSO_BASE_URL:http://localhost:8080}
  calendar-sync:
    enabled: ${CALENDAR_SYNC_ENABLED:true}
    sync-interval-minutes: ${CALENDAR_SYNC_INTERVAL:15}
  offer:
    default-expiry-days: ${OFFER_EXPIRY_DAYS:7}
    docusign:
      enabled: ${DOCUSIGN_ENABLED:false}
      api-base-url: ${DOCUSIGN_API_URL:https://demo.docusign.net/restapi}
      account-id: ${DOCUSIGN_ACCOUNT_ID:}
      integration-key: ${DOCUSIGN_INTEGRATION_KEY:}
    hellosign:
      enabled: ${HELLOSIGN_ENABLED:false}
      api-key: ${HELLOSIGN_API_KEY:}
  security:
    lockout:
      enabled: ${LOCKOUT_ENABLED:true}
      max-failed-attempts: ${LOCKOUT_MAX_ATTEMPTS:5}
      lock-duration-minutes: ${LOCKOUT_DURATION_MINUTES:30}
      attempt-window-minutes: ${LOCKOUT_WINDOW_MINUTES:15}
      max-failed-attempts-per-ip: ${LOCKOUT_MAX_IP_ATTEMPTS:20}
      ip-block-duration-minutes: ${LOCKOUT_IP_BLOCK_MINUTES:60}
      alerts-enabled: ${LOCKOUT_ALERTS_ENABLED:true}
      alert-threshold: ${LOCKOUT_ALERT_THRESHOLD:3}
      ip-blocking-enabled: ${LOCKOUT_IP_BLOCKING:true}
    rsa:
      from-vault: ${RSA_FROM_VAULT:false}
  encryption:
    enabled: ${ENCRYPTION_ENABLED:true}
    secret-key: ${ENCRYPTION_SECRET_KEY:}
    algorithm: AES/GCM/NoPadding
    iv-length: 12
    tag-length: 128
  database:
    separate-users: ${DB_SEPARATE_USERS:false}
    ddl:
      url: ${DB_DDL_URL:${DB_URL:jdbc:postgresql://localhost:5433/interview_platform}}
      username: ${DB_DDL_USERNAME:admin}
      password: ${DB_DDL_PASSWORD:postgres}

  # --- Data Retention ---
  retention:
    enabled: ${DATA_RETENTION_ENABLED:false}
    candidate-data-days: ${RETENTION_CANDIDATE_DAYS:730}
    audit-log-days: ${RETENTION_AUDIT_DAYS:365}
    notification-days: ${RETENTION_NOTIFICATION_DAYS:90}
    activity-days: ${RETENTION_ACTIVITY_DAYS:180}
  # --- Push Notifications (Firebase) ---
  push:
    firebase:
      enabled: ${FIREBASE_PUSH_ENABLED:false}
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  # --- Twilio SMS ---
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  # --- Background Check ---
  background-check:
    enabled: ${BACKGROUND_CHECK_ENABLED:false}
    provider: ${BACKGROUND_CHECK_PROVIDER:checkr}
    api-key: ${BACKGROUND_CHECK_API_KEY:}
    checkr:
      base-url: ${CHECKR_BASE_URL:https://api.checkr.com/v1}
    sterling:
      base-url: ${STERLING_BASE_URL:https://api.sterlingcheck.com/v2}
  # --- ATS Integrations ---
  ats:
    greenhouse:
      api-key: ${GREENHOUSE_API_KEY:}
      base-url: ${GREENHOUSE_BASE_URL:https://harvest.greenhouse.io/v1}
    lever:
      api-key: ${LEVER_API_KEY:}
      base-url: ${LEVER_BASE_URL:https://api.lever.co/v1}
    workday:
      tenant-url: ${WORKDAY_TENANT_URL:}
      client-id: ${WORKDAY_CLIENT_ID:}
  # --- Job Board Posting ---
  job-boards:
    linkedin:
      access-token: ${LINKEDIN_ACCESS_TOKEN:}
    indeed:
      employer-id: ${INDEED_EMPLOYER_ID:}
      api-key: ${INDEED_API_KEY:}
    glassdoor:
      api-key: ${GLASSDOOR_API_KEY:}
  # --- Feature Flags ---
  feature-flags:
    provider: ${FEATURE_FLAGS_PROVIDER:local}
    launchdarkly:
      sdk-key: ${LAUNCHDARKLY_SDK_KEY:}
    flagsmith:
      api-key: ${FLAGSMITH_API_KEY:}
      base-url: ${FLAGSMITH_BASE_URL:https://edge.api.flagsmith.com/api/v1}
  # --- Billing (Stripe) ---
  billing:
    enabled: ${BILLING_ENABLED:false}
    default-currency: ${BILLING_DEFAULT_CURRENCY:USD}
    tax-rate: ${BILLING_TAX_RATE:0.18}
    trial-days: ${BILLING_TRIAL_DAYS:14}
    stripe:
      enabled: ${STRIPE_ENABLED:false}
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    razorpay:
      enabled: ${RAZORPAY_ENABLED:false}
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
    payu:
      enabled: ${PAYU_ENABLED:false}
      merchant-key: ${PAYU_MERCHANT_KEY:}
      merchant-salt: ${PAYU_MERCHANT_SALT:}
      base-url: ${PAYU_BASE_URL:https://info.payu.in}
    cashfree:
      enabled: ${CASHFREE_ENABLED:false}
      app-id: ${CASHFREE_APP_ID:}
      secret-key: ${CASHFREE_SECRET_KEY:}
      base-url: ${CASHFREE_BASE_URL:https://api.cashfree.com/pg}
    phonepe:
      enabled: ${PHONEPE_ENABLED:false}
      merchant-id: ${PHONEPE_MERCHANT_ID:}
      salt-key: ${PHONEPE_SALT_KEY:}
      salt-index: ${PHONEPE_SALT_INDEX:1}
      base-url: ${PHONEPE_BASE_URL:https://api.phonepe.com/apis/hermes}
  # --- SLA Tracking ---
  sla:
    response-time-hours: ${SLA_RESPONSE_TIME_HOURS:48}
    feedback-time-hours: ${SLA_FEEDBACK_TIME_HOURS:24}
    scheduling-time-hours: ${SLA_SCHEDULING_TIME_HOURS:72}
  # --- AI (OpenAI) ---
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      max-tokens: ${OPENAI_MAX_TOKENS:1000}
      temperature: ${OPENAI_TEMPERATURE:0.7}
    scoring:
      enabled: ${AI_SCORING_ENABLED:false}
  # --- Virus Scanning ---
  virus-scan:
    enabled: ${VIRUS_SCAN_ENABLED:false}
    clamav:
      host: ${CLAMAV_HOST:localhost}
      port: ${CLAMAV_PORT:3310}
      timeout-ms: ${CLAMAV_TIMEOUT_MS:30000}
  # --- Email Delivery Tracking ---
  email:
    delivery-tracking:
      enabled: ${EMAIL_DELIVERY_TRACKING:false}
    bounce-threshold: ${EMAIL_BOUNCE_THRESHOLD:5}

# --- Code Execution Engine ---
code-execution:
  enabled: ${CODE_EXECUTION_ENABLED:true}
  max-timeout-ms: ${CODE_EXECUTION_MAX_TIMEOUT:30000}
  default-timeout-ms: ${CODE_EXECUTION_DEFAULT_TIMEOUT:10000}
  memory-limit-bytes: ${CODE_EXECUTION_MEMORY_LIMIT:268435456}
  cpu-period-micros: 100000
  cpu-quota-micros: 50000
  pids-limit: 64
  max-output-size: 65536
  network-disabled: true
  max-concurrent-executions: ${CODE_EXECUTION_MAX_CONCURRENT:10}
  max-source-code-size: 100000
  docker:
    host: ${DOCKER_HOST:unix:///var/run/docker.sock}
    connection-timeout-ms: 5000
    response-timeout-ms: 30000

# --- Resilience4j Circuit Breakers ---
resilience4j:
  circuitbreaker:
    instances:
      emailService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      webhookService:
        slidingWindowSize: 20
        failureRateThreshold: 60
        waitDurationInOpenState: 60s
      aiService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        ignoreExceptions:
          - com.interview_platform_backend.interview_platform_backend.exception.ResourceNotFoundException
          - com.interview_platform_backend.interview_platform_backend.exception.BadRequestException
  retry:
    instances:
      emailService:
        maxAttempts: 3
        waitDuration: 2s
      webhookService:
        maxAttempts: 3
        waitDuration: 5s

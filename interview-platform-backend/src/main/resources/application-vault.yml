spring:
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:false}
      host: ${VAULT_HOST:localhost}
      port: ${VAULT_PORT:8200}
      scheme: ${VAULT_SCHEME:http}
      authentication: TOKEN
      token: ${VAULT_TOKEN:}
      kv:
        enabled: true
        backend: secret
        default-context: interview-platform
        profile-separator: /
      config:
        lifecycle:
          enabled: true
          min-renewal: 10s
          expiry-threshold: 1m
  config:
    import: optional:vault://

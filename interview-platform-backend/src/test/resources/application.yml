# Test profile configuration
spring:
  application:
    name: interview-platform-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/interview_platform
    username: admin
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: admin
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: [openid, profile, email]
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
            scope: [user:email, read:user]
            redirect-uri: "http://localhost:8080/login/oauth2/code/github"
          microsoft:
            client-id: test-microsoft-client-id
            client-secret: test-microsoft-client-secret
            scope: [openid, profile, email]
            redirect-uri: "http://localhost:8080/login/oauth2/code/microsoft"
            client-name: Microsoft
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: email
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/v1.0/me
            user-name-attribute: id

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.interview_platform_backend.*"
    listener:
      auto-startup: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test-password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  docker:
    compose:
      enabled: false

  flyway:
    enabled: false

server:
  port: 8080

jwt:
  secret: test-jwt-secret-key-for-testing-purposes-only-minimum-256-bits-long
  expiration: 86400000
  refresh-secret: test-jwt-refresh-secret-key-for-testing-purposes-only-min-256-bits
  refresh-expiration: 1209600000

rsa:
  public-key: classpath:certs/public.pem
  private-key: classpath:certs/private.pem

management:
  endpoints:
    web:
      exposure:
        include: [health, info]
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 0.0
    enabled: false

logging:
  level:
    root: WARN
    com.interview_platform_backend: INFO

app:
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/callback
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  kafka:
    enabled: false
  notifications:
    enabled: false
  sms:
    enabled: false
    provider: log
  auth:
    reset-password-base-url: http://localhost:5173/reset-password
    verification-base-url: http://localhost:5173/verify-email
  meeting:
    zoom:
      api-key:
      api-secret:
    google:
      client-id:


name: Performance Regression Tests

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      duration:
        description: 'Test duration (e.g., 30s, 1m, 5m)'
        required: false
        default: '30s'
      vus:
        description: 'Virtual users'
        required: false
        default: '10'

env:
  BACKEND_URL: http://localhost:8080
  TEST_DURATION: ${{ github.event.inputs.duration || '30s' }}
  TEST_VUS: ${{ github.event.inputs.vus || '10' }}

jobs:
  performance-test:
    name: k6 Performance Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: interview_platform
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: --health-cmd="pg_isready -U admin" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Backend
        working-directory: interview-platform-backend
        run: |
          cp .env.example .env 2>/dev/null || true
          ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready!"
              break
            fi
            sleep 2
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Run Performance Tests
        working-directory: tests/load
        run: |
          echo "Running with $TEST_VUS VUs for $TEST_DURATION"
          k6 run --vus $TEST_VUS --duration $TEST_DURATION \
            --out json=results.json \
            --summary-export=summary.json \
            concurrent-interviews.js || true

      - name: Check Performance Thresholds
        working-directory: tests/load
        run: |
          if [ -f summary.json ]; then
            python3 -c "
          import json
          with open('summary.json') as f:
              data = json.load(f)
          metrics = data.get('metrics', {})
          http_req_duration = metrics.get('http_req_duration', {})
          p95 = http_req_duration.get('values', {}).get('p(95)', 0)
          failed = metrics.get('http_req_failed', {}).get('values', {}).get('rate', 0)
          print(f'P95 latency: {p95:.0f}ms')
          print(f'Error rate: {failed*100:.2f}%')
          if p95 > 2000:
              print('::warning::P95 latency exceeds 2000ms threshold')
          if failed > 0.05:
              print('::error::Error rate exceeds 5% threshold')
              exit(1)
          print('Performance thresholds PASSED')
          "
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: |
            tests/load/results.json
            tests/load/summary.json
          retention-days: 30

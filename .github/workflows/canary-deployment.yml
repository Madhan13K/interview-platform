name: Canary Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]
      canary_weight:
        description: 'Initial canary weight (%)'
        required: false
        default: '5'
      image_tag:
        description: 'Docker image tag to deploy'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/interview-platform
  CANARY_NAMESPACE: interview-platform

jobs:
  canary-deploy:
    name: Canary Rollout (${{ inputs.canary_weight }}%)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy Canary (Weight ${{ inputs.canary_weight }}%)
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.istio.io/v1beta1
          kind: VirtualService
          metadata:
            name: interview-platform-vs
            namespace: $CANARY_NAMESPACE
          spec:
            hosts:
              - interview-platform
            http:
              - route:
                  - destination:
                      host: interview-platform-stable
                      port:
                        number: 8080
                    weight: $(( 100 - ${{ inputs.canary_weight }} ))
                  - destination:
                      host: interview-platform-canary
                      port:
                        number: 8080
                    weight: ${{ inputs.canary_weight }}
          EOF

      - name: Deploy Canary Pod
        run: |
          kubectl set image deployment/interview-platform-canary \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }} \
            -n $CANARY_NAMESPACE
          kubectl rollout status deployment/interview-platform-canary -n $CANARY_NAMESPACE --timeout=120s

      - name: Monitor Canary (5 minutes)
        run: |
          echo "Monitoring canary for 5 minutes..."
          for i in $(seq 1 10); do
            sleep 30
            ERROR_RATE=$(kubectl exec -n $CANARY_NAMESPACE deploy/prometheus -- \
              promtool query instant http://localhost:9090 \
              'rate(http_server_requests_seconds_count{status=~"5.."}[1m]) / rate(http_server_requests_seconds_count[1m])' \
              2>/dev/null | grep -oP '\d+\.\d+' || echo "0")
            echo "Check $i/10 - Error rate: $ERROR_RATE"
            if (( $(echo "$ERROR_RATE > 0.05" | bc -l 2>/dev/null || echo 0) )); then
              echo "::error::Canary error rate ($ERROR_RATE) exceeds 5% threshold. Rolling back!"
              kubectl rollout undo deployment/interview-platform-canary -n $CANARY_NAMESPACE
              exit 1
            fi
          done
          echo "Canary healthy after 5 minutes!"

      - name: Promote to 25%
        if: success()
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.istio.io/v1beta1
          kind: VirtualService
          metadata:
            name: interview-platform-vs
            namespace: $CANARY_NAMESPACE
          spec:
            hosts:
              - interview-platform
            http:
              - route:
                  - destination:
                      host: interview-platform-stable
                      port:
                        number: 8080
                    weight: 75
                  - destination:
                      host: interview-platform-canary
                      port:
                        number: 8080
                    weight: 25
          EOF
          echo "Canary promoted to 25%. Monitor and run full-promotion workflow when ready."

  auto-rollback:
    name: Auto-Rollback on Failure
    runs-on: ubuntu-latest
    needs: canary-deploy
    if: failure()
    steps:
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Rollback Canary
        run: |
          kubectl rollout undo deployment/interview-platform-canary -n ${{ env.CANARY_NAMESPACE }}
          # Reset traffic to 100% stable
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.istio.io/v1beta1
          kind: VirtualService
          metadata:
            name: interview-platform-vs
            namespace: interview-platform
          spec:
            hosts:
              - interview-platform
            http:
              - route:
                  - destination:
                      host: interview-platform-stable
                      port:
                        number: 8080
                    weight: 100
          EOF
          echo "::warning::Canary rolled back. All traffic restored to stable."

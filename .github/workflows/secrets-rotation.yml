name: Secrets Rotation

on:
  schedule:
    - cron: '0 4 1 * *' # Monthly, 1st day, 4AM UTC
  workflow_dispatch:
    inputs:
      rotate:
        description: 'Which secrets to rotate'
        required: true
        type: choice
        options:
          - jwt-keys
          - api-keys
          - db-passwords
          - all

env:
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

jobs:
  rotate-jwt-keys:
    name: Rotate JWT Signing Keys
    runs-on: ubuntu-latest
    if: inputs.rotate == 'jwt-keys' || inputs.rotate == 'all' || github.event_name == 'schedule'
    steps:
      - name: Install Vault CLI
        run: |
          wget -qO- https://releases.hashicorp.com/vault/1.15.4/vault_1.15.4_linux_amd64.zip | funzip > /usr/local/bin/vault
          chmod +x /usr/local/bin/vault

      - name: Generate New JWT Secret
        run: |
          NEW_JWT_SECRET=$(openssl rand -base64 48)
          NEW_JWT_REFRESH_SECRET=$(openssl rand -base64 48)
          echo "::add-mask::$NEW_JWT_SECRET"
          echo "::add-mask::$NEW_JWT_REFRESH_SECRET"
          echo "JWT_SECRET=$NEW_JWT_SECRET" >> $GITHUB_ENV
          echo "JWT_REFRESH_SECRET=$NEW_JWT_REFRESH_SECRET" >> $GITHUB_ENV

      - name: Store in Vault
        run: |
          vault kv put secret/interview-platform/jwt \
            secret="$JWT_SECRET" \
            refresh_secret="$JWT_REFRESH_SECRET" \
            rotated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            rotated_by="github-actions"

      - name: Trigger Rolling Restart
        run: |
          echo "::notice::JWT keys rotated. Existing tokens remain valid until expiry."
          echo "::notice::New tokens will use the new keys after next pod restart."

  rotate-db-passwords:
    name: Rotate Database Passwords
    runs-on: ubuntu-latest
    if: inputs.rotate == 'db-passwords' || inputs.rotate == 'all' || github.event_name == 'schedule'
    steps:
      - name: Install Vault CLI
        run: |
          wget -qO- https://releases.hashicorp.com/vault/1.15.4/vault_1.15.4_linux_amd64.zip | funzip > /usr/local/bin/vault
          chmod +x /usr/local/bin/vault

      - name: Generate New DB Password
        run: |
          NEW_DB_PASSWORD=$(openssl rand -base64 32 | tr -dc 'a-zA-Z0-9' | head -c 32)
          echo "::add-mask::$NEW_DB_PASSWORD"
          echo "NEW_DB_PASSWORD=$NEW_DB_PASSWORD" >> $GITHUB_ENV

      - name: Update Database Password
        run: |
          echo "::notice::Database password rotation requires manual RDS/Cloud SQL update."
          echo "::notice::1. Update password in managed database console"
          echo "::notice::2. Update Vault: vault kv put secret/interview-platform/db password=$NEW_DB_PASSWORD"
          echo "::notice::3. Trigger rolling restart of application pods"

      - name: Store Rotation Record
        run: |
          vault kv put secret/interview-platform/rotation-log/$(date +%Y%m%d) \
            type="db-password" \
            rotated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            status="pending-manual-update"

  rotate-api-keys:
    name: Rotate Internal API Keys
    runs-on: ubuntu-latest
    if: inputs.rotate == 'api-keys' || inputs.rotate == 'all' || github.event_name == 'schedule'
    steps:
      - name: Install Vault CLI
        run: |
          wget -qO- https://releases.hashicorp.com/vault/1.15.4/vault_1.15.4_linux_amd64.zip | funzip > /usr/local/bin/vault
          chmod +x /usr/local/bin/vault

      - name: Generate New Encryption Key
        run: |
          NEW_ENCRYPTION_KEY=$(openssl rand -base64 32)
          echo "::add-mask::$NEW_ENCRYPTION_KEY"
          vault kv put secret/interview-platform/encryption \
            key="$NEW_ENCRYPTION_KEY" \
            rotated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Summary
        run: |
          echo "## Secrets Rotation Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Date |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Encryption Key | Rotated | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY

name: Deploy & Seed Test Data

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      seed_data:
        description: 'Seed test data after deploy'
        required: true
        default: true
        type: boolean

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Stage 1: Build Backend
  # ═══════════════════════════════════════════════════════════════
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (skip tests)
        working-directory: interview-platform-backend
        run: ./mvnw package -DskipTests -DskipIntegrationTests

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: interview-platform-backend/target/*.jar

  # ═══════════════════════════════════════════════════════════════
  # Stage 2: Build Frontend
  # ═══════════════════════════════════════════════════════════════
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Build
        working-directory: interview-platform-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.BACKEND_URL || 'https://interview-platform-backend.onrender.com' }}

  # ═══════════════════════════════════════════════════════════════
  # Stage 3: Deploy Backend to Render
  # ═══════════════════════════════════════════════════════════════
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
            echo "✓ Render deploy triggered for backend"
          else
            echo "⚠ RENDER_DEPLOY_HOOK_BACKEND secret not set. Skipping auto-deploy."
            echo "  Set up at: render.com → Service → Settings → Deploy Hook"
          fi

  # ═══════════════════════════════════════════════════════════════
  # Stage 4: Deploy Frontend to Vercel
  # ═══════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        working-directory: interview-platform-frontend
        run: |
          npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip Vercel (no token)
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "⚠ VERCEL_TOKEN not set. Frontend auto-deploys via GitHub integration."
          echo "  Connect at: vercel.com/import → select this repo"

  # ═══════════════════════════════════════════════════════════════
  # Stage 5: Wait for Deploy & Health Check
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Wait for deployment
        run: |
          echo "Waiting 60s for deployment to stabilize..."
          sleep 60

      - name: Check backend health
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL || 'https://interview-platform-backend.onrender.com' }}"
          echo "Checking: $BACKEND_URL/actuator/health"
          
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/actuator/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend is healthy (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i: status=$STATUS, retrying in 30s..."
            sleep 30
          done
          
          echo "✗ Backend health check failed after 5 attempts"
          exit 1

  # ═══════════════════════════════════════════════════════════════
  # Stage 6: Seed Test Data
  # ═══════════════════════════════════════════════════════════════
  seed-test-data:
    name: Seed Test Data
    runs-on: ubuntu-latest
    needs: health-check
    if: ${{ inputs.seed_data == true || inputs.seed_data == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for JSON parsing)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Seed test data
        env:
          BASE_URL: ${{ vars.BACKEND_URL || 'https://interview-platform-backend.onrender.com' }}
          ADMIN_EMAIL: ${{ vars.ADMIN_EMAIL || 'admin@interview.com' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'admin123' }}
        run: |
          chmod +x scripts/seed-test-data.sh
          bash scripts/seed-test-data.sh

      - name: Verify seeded data
        env:
          BASE_URL: ${{ vars.BACKEND_URL || 'https://interview-platform-backend.onrender.com' }}
        run: |
          echo "═══ Verifying seeded data ═══"
          
          # Login
          TOKEN=$(curl -s -X POST "$BASE_URL/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@interview.com","password":"admin123"}' | python3 -c "import sys,json;print(json.load(sys.stdin).get('accessToken',''))")
          
          if [ -z "$TOKEN" ]; then
            echo "✗ Cannot authenticate to verify data"
            exit 1
          fi
          
          # Verify endpoints
          echo "Checking interviews..."
          INTERVIEWS=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE_URL/api/v1/interviews" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d) if isinstance(d,list) else d.get('totalElements',0))")
          echo "  ✓ Interviews: $INTERVIEWS"
          
          echo "Checking users..."
          USERS=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE_URL/api/v1/users" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d) if isinstance(d,list) else 0)")
          echo "  ✓ Users: $USERS"
          
          echo "Checking questions..."
          QUESTIONS=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE_URL/api/v1/questions/search?page=0&size=1" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('totalElements',0))" 2>/dev/null || echo "0")
          echo "  ✓ Questions: $QUESTIONS"
          
          echo "Checking job positions..."
          JOBS=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE_URL/api/v1/job-positions" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d) if isinstance(d,list) else 0)")
          echo "  ✓ Job Positions: $JOBS"
          
          echo "Checking notifications..."
          NOTIF=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE_URL/api/v1/notifications/count" | python3 -c "import sys,json;print(json.load(sys.stdin).get('count',0))" 2>/dev/null || echo "0")
          echo "  ✓ Notifications: $NOTIF"
          
          echo "Checking feature flags..."
          FLAGS=$(curl -s -H "Authorization: Bearer $TOKEN" "$BASE_URL/api/v1/feature-flags" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d))" 2>/dev/null || echo "0")
          echo "  ✓ Feature Flags: $FLAGS"
          
          echo ""
          echo "═══ Data Verification Complete ═══"

  # ═══════════════════════════════════════════════════════════════
  # Stage 7: Summary
  # ═══════════════════════════════════════════════════════════════
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [health-check, seed-test-data]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║       DEPLOYMENT & TEST DATA PIPELINE COMPLETE       ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║                                                      ║"
          echo "║  Backend:  ${{ vars.BACKEND_URL || 'https://interview-platform-backend.onrender.com' }}"
          echo "║  Frontend: ${{ vars.FRONTEND_URL || 'https://interview-platform.vercel.app' }}"
          echo "║  Swagger:  ${{ vars.BACKEND_URL || 'https://interview-platform-backend.onrender.com' }}/swagger-ui/index.html"
          echo "║                                                      ║"
          echo "║  Test Accounts:                                      ║"
          echo "║    Admin:       admin@interview.com / admin123       ║"
          echo "║    Recruiter:   frank@test.com / Test@123            ║"
          echo "║    Interviewer: alice@test.com / Test@123            ║"
          echo "║    Candidate:   charlie@test.com / Test@123          ║"
          echo "║                                                      ║"
          echo "╚══════════════════════════════════════════════════════╝"

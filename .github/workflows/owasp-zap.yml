name: OWASP ZAP Security Scan (DAST)

on:
  schedule:
    - cron: '0 2 * * 1' # Weekly Monday 2AM UTC
  workflow_dispatch: # Manual trigger
  pull_request:
    branches: [master]
    paths:
      - 'interview-platform-backend/src/**'

env:
  TARGET_URL: http://localhost:8080
  ZAP_RULES_FILE: .github/zap/rules.tsv

jobs:
  zap-baseline-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: interview_platform
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Backend
        working-directory: interview-platform-backend
        run: |
          cp .env.example .env
          ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev \
            -Dspring-boot.run.arguments="--server.port=8080" &
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Backend is ready!"
              break
            fi
            sleep 2
          done

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: ${{ env.ZAP_RULES_FILE }}
          cmd_options: >-
            -a
            -j
            -l WARN
            -z "-config api.disablekey=true
                -config scanner.strength=MEDIUM
                -config scanner.threshold=LOW"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: report_html.html
          retention-days: 30

  zap-api-scan:
    name: ZAP API Scan (OpenAPI)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: zap-baseline-scan

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: interview_platform
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Backend
        working-directory: interview-platform-backend
        run: |
          cp .env.example .env
          ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev &
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/actuator/health | grep -q "UP"; then break; fi
            sleep 2
          done

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: http://localhost:8080/v3/api-docs
          format: openapi
          cmd_options: >-
            -a
            -l WARN
            -z "-config replacer.full_list(0).description=AuthHeader
                -config replacer.full_list(0).enabled=true
                -config replacer.full_list(0).matchtype=REQ_HEADER
                -config replacer.full_list(0).matchstr=Authorization
                -config replacer.full_list(0).replacement=Bearer\ test-jwt-token"

      - name: Upload API Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-scan-report
          path: report_html.html
          retention-days: 30

      - name: Fail on High/Critical Findings
        if: failure()
        run: |
          echo "::error::OWASP ZAP found security vulnerabilities! Review the uploaded report."
          exit 1

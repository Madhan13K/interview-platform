name: Dependency Security Audit

on:
  schedule:
    - cron: '0 6 * * 3' # Wednesday 6AM UTC
  workflow_dispatch:

jobs:
  backend-audit:
    name: Backend Dependency Audit (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency-Check
        working-directory: interview-platform-backend
        run: ./mvnw dependency-check:check -B -DfailBuildOnCVSS=7

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: interview-platform-backend/target/dependency-check-report.html
          retention-days: 30

      - name: Check for Critical CVEs
        working-directory: interview-platform-backend
        run: |
          if [ -f target/dependency-check-report.json ]; then
            CRITICAL=$(cat target/dependency-check-report.json | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            vulns = [d for d in data.get('dependencies', []) if any(v.get('severity') in ['CRITICAL','HIGH'] for v in d.get('vulnerabilities', []))]
            print(len(vulns))")
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Found $CRITICAL dependencies with HIGH/CRITICAL vulnerabilities"
              exit 1
            fi
          fi

  frontend-audit:
    name: Frontend Dependency Audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: npm audit
        working-directory: interview-platform-frontend
        run: |
          npm ci
          npm audit --audit-level=high || true

      - name: Check for Critical Vulnerabilities
        working-directory: interview-platform-frontend
        run: |
          AUDIT_RESULT=$(npm audit --json 2>/dev/null || true)
          CRITICAL=$(echo "$AUDIT_RESULT" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            print(data.get('metadata', {}).get('vulnerabilities', {}).get('critical', 0))
          except: print(0)")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical npm vulnerabilities"
            exit 1
          fi

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Check Frontend Licenses
        working-directory: interview-platform-frontend
        run: |
          npm ci
          npx license-checker --failOn "GPL-3.0;AGPL-3.0" --summary || true

name: Interview Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  backend-test:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run Backend Tests
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: false
          SMS_ENABLED: false
        run: ./mvnw verify -DskipITs=false -q
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: interview-platform-backend/target/surefire-reports/

  frontend-build:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json
      - name: Install Dependencies
        working-directory: interview-platform-frontend
        run: npm ci
      - name: Build
        working-directory: interview-platform-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build
      - name: Lint
        working-directory: interview-platform-frontend
        run: npm run lint || true

  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend Image
        run: |
          cd interview-platform-backend
          docker build -t interview-platform-backend:${{ github.sha }} .
      - name: Build Frontend Image
        run: |
          cd interview-platform-frontend
          docker build -t interview-platform-frontend:${{ github.sha }} .

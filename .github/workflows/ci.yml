name: Interview Platform CI/CD

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ==========================================================================
  # Stage 1: Backend - Build & Unit Tests
  # ==========================================================================
  backend-build:
    name: Backend - Build & Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and run unit tests
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: 'false'
          SMS_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw verify -DskipIntegrationTests -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-test-results
          path: interview-platform-backend/target/surefire-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-jar
          path: interview-platform-backend/target/*.jar

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: interview-platform-backend/target/site/jacoco/
          if-no-files-found: ignore

  # ==========================================================================
  # Stage 2: Frontend - Build & Lint
  # ==========================================================================
  frontend-build:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Build
        working-directory: interview-platform-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Lint
        working-directory: interview-platform-frontend
        run: npm run lint || true

  # ==========================================================================
  # Stage 3: Frontend - Unit & Component Tests (Vitest)
  # ==========================================================================
  frontend-unit-tests:
    name: Frontend - Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: interview-platform-frontend
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-report
          path: interview-platform-frontend/coverage/

  # ==========================================================================
  # Stage 4: Frontend - E2E Tests (Playwright)
  # ==========================================================================
  e2e-tests:
    name: Frontend - E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Start backend
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: 'false'
          SMS_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DOCKER_COMPOSE_ENABLED: 'false'
          OTEL_SDK_DISABLED: 'true'
          OTEL_TRACES_EXPORTER: none
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          JAVA_TOOL_OPTIONS: ''
        run: |
          ./mvnw spring-boot:run -DskipTests -Dspring-boot.run.jvmArguments="" &
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend started!"
              break
            fi
            sleep 5
          done

      - name: Install frontend dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: interview-platform-frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: interview-platform-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: interview-platform-frontend
        env:
          CI: 'true'
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npx playwright test --project=chromium --reporter=github

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: interview-platform-frontend/playwright-report/

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-test-results
          path: interview-platform-frontend/test-results/

  # ==========================================================================
  # Stage 5: Backend - Integration Tests (Testcontainers)
  # ==========================================================================

  integration-tests:
    name: Backend - Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run integration tests with Testcontainers
        working-directory: interview-platform-backend
        run: ./mvnw verify -PintegrationTests -B
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'false'
          SPRING_PROFILES_ACTIVE: integration

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-results
          path: interview-platform-backend/target/failsafe-reports/

  # ==========================================================================
  # Stage 6: SAST - Static Application Security Testing (SonarCloud)
  # ==========================================================================
  sast:
    name: SAST (SonarCloud)
    runs-on: ubuntu-latest
    needs: backend-build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Download JaCoCo report
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: jacoco-report
          path: interview-platform-backend/target/site/jacoco/

      - name: Build and analyze with SonarCloud
        working-directory: interview-platform-backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./mvnw compile sonar:sonar \
            -Dmaven.test.skip=true \
            -Dsonar.projectKey=madhan13k_interview-platform-backend \
            -Dsonar.organization=madhan13k \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.java.coveragePlugin=jacoco \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -B

  # ==========================================================================
  # Stage 7: Dependency Vulnerability Scanning (OWASP)
  # ==========================================================================
  dependency-scan:
    name: Dependency Scan (OWASP)
    runs-on: ubuntu-latest
    needs: backend-build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache NVD data
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-nvd-${{ hashFiles('interview-platform-backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-owasp-nvd-

      - name: Run OWASP Dependency Check
        working-directory: interview-platform-backend
        continue-on-error: true
        run: ./mvnw dependency-check:check -B
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: owasp-dependency-check-report
          path: interview-platform-backend/target/dependency-check-report.*

  # ==========================================================================
  # Stage 8: Database Migration Validation
  # ==========================================================================
  migration-check:
    name: DB Migration Validation
    runs-on: ubuntu-latest
    needs: backend-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: ddl_admin
          POSTGRES_PASSWORD: test_password
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ddl_admin -d interview_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate Flyway migrations
        working-directory: interview-platform-backend
        run: |
          ./mvnw flyway:validate -B \
            -Dflyway.url=jdbc:postgresql://localhost:5432/interview_platform_test \
            -Dflyway.user=ddl_admin \
            -Dflyway.password=test_password \
            -Dflyway.locations=classpath:db/migration
        continue-on-error: true

      - name: Run Flyway migrations
        working-directory: interview-platform-backend
        run: |
          ./mvnw flyway:migrate -B \
            -Dflyway.url=jdbc:postgresql://localhost:5432/interview_platform_test \
            -Dflyway.user=ddl_admin \
            -Dflyway.password=test_password \
            -Dflyway.locations=classpath:db/migration

  # ==========================================================================
  # Stage 9: Docker Build & Trivy Security Scan
  # ==========================================================================
  docker-build-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./interview-platform-backend
          push: false
          load: true
          tags: interview-platform-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./interview-platform-frontend
          push: false
          load: true
          tags: interview-platform-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on Backend image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: interview-platform-backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Run Trivy on Frontend image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: interview-platform-frontend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy Backend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy Frontend results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

      - name: Trivy table output (Backend)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: interview-platform-backend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Trivy table output (Frontend)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: interview-platform-frontend:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Log in to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Backend image to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: ./interview-platform-backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Frontend image to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: ./interview-platform-frontend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Stage 10: Security Summary Gate
  # ==========================================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan, docker-build-scan]
    if: always()
    steps:
      - name: Check security scan results
        run: |
          echo "=== Security Scan Summary ==="
          echo "SAST (SonarCloud): ${{ needs.sast.result }}"
          echo "Dependency Scan (OWASP): ${{ needs.dependency-scan.result }}"
          echo "Docker Scan (Trivy): ${{ needs.docker-build-scan.result }}"
          echo ""
          if [ "${{ needs.docker-build-scan.result }}" == "failure" ]; then
            echo "CRITICAL: Docker scan found vulnerabilities."
            exit 1
          fi
          if [ "${{ needs.sast.result }}" == "failure" ]; then
            echo "CRITICAL: SAST scan failed."
            exit 1
          fi
          echo "All security gates passed."

  # ==========================================================================
  # Stage 11: Performance - Load Tests (k6)
  # ==========================================================================
  load-tests:
    name: Performance - Load Tests (k6)
    runs-on: ubuntu-latest
    needs: [backend-build]
    if: github.ref == 'refs/heads/master'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Start backend for load testing
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: 'false'
          SMS_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DOCKER_COMPOSE_ENABLED: 'false'
          OTEL_SDK_DISABLED: 'true'
          OTEL_TRACES_EXPORTER: none
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          JAVA_TOOL_OPTIONS: ''
        run: |
          ./mvnw spring-boot:run -DskipTests -Dspring-boot.run.jvmArguments="" &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend started!"
              break
            fi
            sleep 5
          done

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6
          k6 version

      - name: Run rate limiter stress test
        run: k6 run load-tests/rate-limiter-stress.js
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080

      - name: Run bulk schedule test (reduced)
        run: k6 run --vus 5 --iterations 50 load-tests/bulk-schedule.js
        continue-on-error: true
        env:
          BASE_URL: http://localhost:8080

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: k6-load-test-results
          path: load-tests/

  # ==========================================================================
  # Stage 12: Pipeline Summary
  # ==========================================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, frontend-unit-tests, e2e-tests, integration-tests, sast, dependency-scan, migration-check, docker-build-scan, security-gate]
    if: always()
    steps:
      - name: Pipeline results
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║         CI/CD PIPELINE SUMMARY                       ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Backend Build & Tests:    ${{ needs.backend-build.result }}"
          echo "║  Frontend Build & Lint:    ${{ needs.frontend-build.result }}"
          echo "║  Frontend Unit Tests:      ${{ needs.frontend-unit-tests.result }}"
          echo "║  E2E Tests (Playwright):   ${{ needs.e2e-tests.result }}"
          echo "║  Integration Tests:        ${{ needs.integration-tests.result }}"
          echo "║  SAST (SonarCloud):        ${{ needs.sast.result }}"
          echo "║  Dependency Scan (OWASP):  ${{ needs.dependency-scan.result }}"
          echo "║  DB Migration Check:       ${{ needs.migration-check.result }}"
          echo "║  Docker Build & Trivy:     ${{ needs.docker-build-scan.result }}"
          echo "║  Security Gate:            ${{ needs.security-gate.result }}"
          echo "╚══════════════════════════════════════════════════════╝"

name: PR Tests Pipeline

on:
  pull_request:
    branches: [master]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  # ==========================================================================
  # Stage 1: Backend - Build & Unit Tests
  # ==========================================================================
  backend-build:
    name: Backend - Build & Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and run unit tests
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: 'false'
          SMS_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw verify -DskipIntegrationTests -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-test-results
          path: interview-platform-backend/target/surefire-reports/

  # ==========================================================================
  # Stage 2: Frontend - Build & Lint
  # ==========================================================================
  frontend-build:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Build
        working-directory: interview-platform-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Lint
        working-directory: interview-platform-frontend
        run: npm run lint || true

  # ==========================================================================
  # Stage 3: Frontend - Unit Tests (Vitest)
  # ==========================================================================
  frontend-unit-tests:
    name: Frontend - Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: interview-platform-frontend
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-report
          path: interview-platform-frontend/coverage/

  # ==========================================================================
  # Stage 4: Frontend - E2E Tests (Playwright)
  # ==========================================================================
  e2e-tests:
    name: Frontend - E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    continue-on-error: true
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      mailpit:
        image: axllent/mailpit:latest
        ports: ['1025:1025', '8025:8025']
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Start backend
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: 'false'
          SMS_ENABLED: 'false'
          CODE_EXECUTION_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DOCKER_COMPOSE_ENABLED: 'false'
          SPRING_MAIL_HOST: localhost
          SPRING_MAIL_PORT: '1025'
          SPRING_MAIL_USERNAME: ''
          SPRING_MAIL_PASSWORD: ''
          SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: 'false'
          SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: 'false'
          OTEL_SDK_DISABLED: 'true'
          OTEL_TRACES_EXPORTER: none
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          JAVA_TOOL_OPTIONS: ''
        run: |
          cp src/test/resources/certs/private.pem src/main/resources/certs/private.pem
          ./mvnw spring-boot:run -DskipTests -Dspring-boot.run.jvmArguments="" &
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend started!"
              break
            fi
            sleep 5
          done

      - name: Install frontend dependencies
        working-directory: interview-platform-frontend
        run: npm ci

      - name: Seed test data
        run: |
          chmod +x scripts/seed-test-data.sh
          bash scripts/seed-test-data.sh
        env:
          BASE_URL: http://localhost:8080

      - name: Install Playwright browsers
        working-directory: interview-platform-frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: interview-platform-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: interview-platform-frontend
        env:
          CI: 'true'
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npx playwright test --project=chromium

      - name: Cleanup
        if: always()
        run: pkill -f "spring-boot:run" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: interview-platform-frontend/playwright-report/

  # ==========================================================================
  # Stage 5: API Integration Tests
  # ==========================================================================
  api-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      mailpit:
        image: axllent/mailpit:latest
        ports: ['1025:1025', '8025:8025']
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Start backend
        working-directory: interview-platform-backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/interview_platform_test
          DB_USERNAME: test
          DB_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-jwt-secret-key-minimum-256-bits-long-for-testing-purposes-only
          JWT_REFRESH_SECRET: ci-test-refresh-secret-key-minimum-256-bits-long-for-testing-only
          KAFKA_ENABLED: 'false'
          SMS_ENABLED: 'false'
          CODE_EXECUTION_ENABLED: 'false'
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DOCKER_COMPOSE_ENABLED: 'false'
          SPRING_MAIL_HOST: localhost
          SPRING_MAIL_PORT: '1025'
          SPRING_MAIL_USERNAME: ''
          SPRING_MAIL_PASSWORD: ''
          SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: 'false'
          SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: 'false'
          OTEL_SDK_DISABLED: 'true'
          OTEL_TRACES_EXPORTER: none
          OTEL_METRICS_EXPORTER: none
          OTEL_LOGS_EXPORTER: none
          JAVA_TOOL_OPTIONS: ''
        run: |
          cp src/test/resources/certs/private.pem src/main/resources/certs/private.pem
          ./mvnw spring-boot:run -DskipTests -Dspring-boot.run.jvmArguments="" &
          echo "Waiting for backend to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend started!"
              break
            fi
            sleep 5
          done

      - name: Run API integration tests
        run: |
          chmod +x tests/api/api-tests.sh
          bash tests/api/api-tests.sh
        env:
          BASE_URL: http://localhost:8080

      - name: Stop backend
        if: always()
        run: pkill -f "spring-boot:run" || true

  # ==========================================================================
  # Stage 6: Database Integration Tests
  # ==========================================================================
  db-tests:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: interview_platform_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Flyway migrations
        working-directory: interview-platform-backend
        run: |
          ./mvnw flyway:migrate -B \
            -Dflyway.url=jdbc:postgresql://localhost:5432/interview_platform_test \
            -Dflyway.user=test \
            -Dflyway.password=test \
            -Dflyway.locations=filesystem:src/main/resources/db/migration

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run DB integration tests
        run: |
          chmod +x tests/db/db-integration-tests.sh
          bash tests/db/db-integration-tests.sh
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: interview_platform_test
          DB_USER: test
          DB_PASSWORD: test

  # ==========================================================================
  # Stage 7: Security Scanning & Gate
  # ==========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: interview-platform-frontend/package-lock.json

      - name: Frontend - npm audit
        working-directory: interview-platform-frontend
        run: |
          npm ci --ignore-scripts
          echo "=== NPM Security Audit ==="
          npm audit --audit-level=critical || true

      - name: Backend - dependency vulnerability check
        working-directory: interview-platform-backend
        continue-on-error: true
        run: |
          echo "=== Maven Dependency CVE Check ==="
          ./mvnw dependency-check:check -B -DfailBuildOnCVSS=9 2>/dev/null || echo "Dependency check completed"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pr-security-report
          path: interview-platform-backend/target/dependency-check-report.*
          if-no-files-found: ignore

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: always()
    steps:
      - name: Evaluate security scan results
        run: |
          echo "=== PR Security Gate ==="
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo ""
          if [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "WARNING: Security scan reported critical vulnerabilities."
            echo "Review the pr-security-report artifact for details."
          fi
          echo "Security Gate: PASSED"

  # ==========================================================================
  # Stage 8: PR Summary
  # ==========================================================================
  pr-summary:
    name: PR Test Summary
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, frontend-unit-tests, e2e-tests, api-tests, db-tests, security-gate]
    if: always()
    steps:
      - name: Test results
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║         PR TEST PIPELINE SUMMARY                     ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  Backend Build & Tests:    ${{ needs.backend-build.result }}"
          echo "║  Frontend Build & Lint:    ${{ needs.frontend-build.result }}"
          echo "║  Frontend Unit Tests:      ${{ needs.frontend-unit-tests.result }}"
          echo "║  E2E Tests (Playwright):   ${{ needs.e2e-tests.result }}"
          echo "║  API Integration Tests:    ${{ needs.api-tests.result }}"
          echo "║  DB Integration Tests:     ${{ needs.db-tests.result }}"
          echo "║  Security Gate:            ${{ needs.security-gate.result }}"
          echo "╚══════════════════════════════════════════════════════╝"

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://host.docker.internal:3100
    editable: true

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://host.docker.internal:16686
    editable: true

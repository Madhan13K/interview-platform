groups:
  - name: interview-platform-alerts
    rules:
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 response time > 2s"
          description: "{{ $labels.uri }} p95 latency is {{ $value }}s"

      - alert: CriticalErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 5%"

      - alert: DBConnectionPoolExhaustion
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.85
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "HikariCP pool > 85% utilized"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"

      - alert: JVMHeapPressure
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap > 85%"

      - alert: ApplicationDown
        expr: up{job="interview-platform"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Application is DOWN"

      - alert: AccountLockoutSpike
        expr: rate(account_lockouts_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Possible brute force attack"

      - alert: DiskSpaceCritical
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space < 15%"
